services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: regexriddle
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      # 5433 sull'host per non confliggere con un eventuale PostgreSQL locale su 5432
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/regexriddle
      # Senza questa variabile il backend userebbe un segreto di default insicuro.
      JWT_SECRET: chiaveSuperSegretaLungaAlmenoTrentadueCarat
      JWT_EXPIRATION: 86400000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
